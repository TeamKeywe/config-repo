spring:
  config:
    activate:
      on-profile: "routes"
  cloud:
    gateway:
      routes:
        - id: member-service-members
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/members/**
            
        - id: member-service-auth
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/auth/**

        - id: did-service
          uri: lb://DID-SERVICE
          predicates:
            - Path=/dids/**
            - Platform=MOBILE

        - id: hospital-service
          uri: lb://HOSPITAL-SERVICE
          predicates:
            - Path=/hospitals/**
            - Platform=MOBILE

        - id: pass-service
          uri: lb://PASS-SERVICE
          predicates:
            - Path=/passes/**
            - Platform=MOBILE

        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patients/**
            - Platform=MOBILE

        # Swagger UI routes
        - id: swagger-member
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/v3/api-docs/member
          filters:
            - RewritePath=/v3/api-docs/member, /v3/api-docs

        - id: swagger-did
          uri: lb://DID-SERVICE
          predicates:
            - Path=/v3/api-docs/did
          filters:
            - RewritePath=/v3/api-docs/did, /v3/api-docs

        - id: swagger-pass
          uri: lb://PASS-SERVICE
          predicates:
            - Path=/v3/api-docs/pass
          filters:
            - RewritePath=/v3/api-docs/pass, /v3/api-docs

        - id: swagger-hospital
          uri: lb://HOSPITAL-SERVICE
          predicates:
            - Path=/v3/api-docs/hospital
          filters:
            - RewritePath=/v3/api-docs/hospital, /v3/api-docs

        - id: swagger-patient
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/v3/api-docs/patient
          filters:
            - RewritePath=/v3/api-docs/patient, /v3/api-docs