spring:
  config:
    activate:
      on-profile: "datasource"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${DB_NAME:keywe_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:0912}
    
  jpa:
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: false
  sql:
    init:
      mode: never
      encoding: UTF-8

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace # 바인딩되는 값까지 출력
